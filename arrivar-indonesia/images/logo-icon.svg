<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8c97a"/>
    </linearGradient>
  </defs>
  <!-- Letter A body -->
  <polygon points="30,5 5,55 15,55 30,20 45,55 55,55" fill="url(#goldGrad)"/>
  <!-- Crossbar -->
  <rect x="16" y="38" width="28" height="5" fill="url(#goldGrad)"/>
  <!-- Arrow line through A -->
  <line x1="33" y1="21" x2="51" y2="3" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="51,3 42,7 48,13" fill="url(#goldGrad)"/>
</svg>
